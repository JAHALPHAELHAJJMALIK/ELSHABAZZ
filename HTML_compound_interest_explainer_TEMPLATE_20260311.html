
<style>
  .controls { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 1.5rem; }
  .control-row { display: flex; flex-direction: column; gap: 6px; }
  .control-label { display: flex; justify-content: space-between; font-size: 13px; color: var(--color-text-secondary); }
  .control-value { font-weight: 500; color: var(--color-text-primary); }
  .stat-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 1.5rem; }
  .stat { background: var(--color-background-secondary); border-radius: var(--border-radius-md); padding: 14px; }
  .stat-label { font-size: 12px; color: var(--color-text-secondary); margin-bottom: 4px; }
  .stat-val { font-size: 20px; font-weight: 500; color: var(--color-text-primary); }
  .stat-sub { font-size: 12px; color: var(--color-text-secondary); margin-top: 2px; }
  .chart-wrap { position: relative; width: 100%; height: 280px; }
</style>

<div class="controls">
  <div class="control-row">
    <div class="control-label">Principal <span class="control-value" id="p-out">$10,000</span></div>
    <input type="range" min="1000" max="100000" step="1000" value="10000" id="principal">
  </div>
  <div class="control-row">
    <div class="control-label">Annual rate <span class="control-value" id="r-out">7%</span></div>
    <input type="range" min="1" max="20" step="0.5" value="7" id="rate">
  </div>
  <div class="control-row">
    <div class="control-label">Years <span class="control-value" id="y-out">20</span></div>
    <input type="range" min="1" max="50" step="1" value="20" id="years">
  </div>
  <div class="control-row">
    <div class="control-label">Compounds <span class="control-value" id="c-out">Monthly</span></div>
    <input type="range" min="1" max="4" step="1" value="2" id="compound">
  </div>
</div>

<div class="stat-grid">
  <div class="stat">
    <div class="stat-label">Final balance</div>
    <div class="stat-val" id="final-val">—</div>
    <div class="stat-sub" id="final-x">—</div>
  </div>
  <div class="stat">
    <div class="stat-label">Interest earned</div>
    <div class="stat-val" id="interest-val">—</div>
    <div class="stat-sub" id="interest-pct">—</div>
  </div>
  <div class="stat">
    <div class="stat-label">Simple interest would give</div>
    <div class="stat-val" id="simple-val">—</div>
    <div class="stat-sub" id="simple-diff">—</div>
  </div>
</div>

<div class="chart-wrap">
  <canvas id="chart"></canvas>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script>
const compoundLabels = ['Annual','Semi-annual','Monthly','Daily'];
const compoundValues = [1,2,12,365];
let myChart;

function fmt(n) {
  return '$' + Math.round(n).toLocaleString();
}

function update() {
  const P = +document.getElementById('principal').value;
  const r = +document.getElementById('rate').value / 100;
  const Y = +document.getElementById('years').value;
  const ci = +document.getElementById('compound').value;
  const n = compoundValues[ci - 1];

  document.getElementById('p-out').textContent = fmt(P);
  document.getElementById('r-out').textContent = (+document.getElementById('rate').value) + '%';
  document.getElementById('y-out').textContent = Y;
  document.getElementById('c-out').textContent = compoundLabels[ci - 1];

  const labels = [];
  const compoundData = [];
  const simpleData = [];

  for (let y = 0; y <= Y; y++) {
    labels.push(y === 0 ? 'Now' : 'Yr ' + y);
    compoundData.push(P * Math.pow(1 + r / n, n * y));
    simpleData.push(P * (1 + r * y));
  }

  const finalC = compoundData[Y];
  const finalS = simpleData[Y];

  document.getElementById('final-val').textContent = fmt(finalC);
  document.getElementById('final-x').textContent = (finalC / P).toFixed(1) + 'x your money';
  document.getElementById('interest-val').textContent = fmt(finalC - P);
  document.getElementById('interest-pct').textContent = Math.round((finalC - P) / P * 100) + '% return';
  document.getElementById('simple-val').textContent = fmt(finalS);
  document.getElementById('simple-diff').textContent = fmt(finalC - finalS) + ' less';

  if (myChart) myChart.destroy();
  myChart = new Chart(document.getElementById('chart'), {
    type: 'line',
    data: {
      labels,
      datasets: [
        {
          label: 'Compound interest',
          data: compoundData,
          borderColor: '#185FA5',
          backgroundColor: 'rgba(24,95,165,0.08)',
          fill: true,
          tension: 0.4,
          pointRadius: 0,
          borderWidth: 2.5
        },
        {
          label: 'Simple interest',
          data: simpleData,
          borderColor: '#888780',
          backgroundColor: 'transparent',
          fill: false,
          tension: 0,
          pointRadius: 0,
          borderWidth: 1.5,
          borderDash: [5,4]
        }
      ]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: {
        legend: { display: false },
        tooltip: {
          callbacks: {
            label: ctx => ' ' + ctx.dataset.label + ': ' + fmt(ctx.parsed.y)
          }
        }
      },
      scales: {
        x: { ticks: { maxTicksLimit: 8, font: { size: 11 } }, grid: { display: false } },
        y: {
          ticks: {
            callback: v => '$' + (v >= 1000 ? Math.round(v/1000) + 'k' : Math.round(v)),
            maxTicksLimit: 6,
            font: { size: 11 }
          },
          grid: { color: 'rgba(128,128,128,0.1)' }
        }
      }
    }
  });
}

['principal','rate','years','compound'].forEach(id => {
  document.getElementById(id).addEventListener('input', update);
});

update();
</script>

<div style="display: flex; gap: 20px; margin-top: 12px; font-size: 12px; color: var(--color-text-secondary);">
  <span style="display: flex; align-items: center; gap: 6px;"><span style="width: 24px; height: 2.5px; background: #185FA5; border-radius: 2px; display: inline-block;"></span>Compound interest</span>
  <span style="display: flex; align-items: center; gap: 6px;"><span style="width: 24px; height: 0; border-top: 1.5px dashed #888780; display: inline-block;"></span>Simple interest</span>
</div>
